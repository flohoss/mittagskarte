<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Finde täglich aktuelle Mittagsangebote und Restaurants in Stuttgart und Umgebung. Schniddzl.de bietet dir eine einzigartige Übersicht über die besten Mittagstische, Speisekarten und kulinarische Highlights der Region."
    />
    <meta name="google" content="notranslate" />
    <meta property="og:title" content="Schniddzl.de – Die beste Übersicht für Mittagessen in Stuttgart" />
    <meta
      property="og:description"
      content="Täglich aktuelle Mittagsangebote, Restaurants und Speisekarten für Stuttgart und Umgebung. Jetzt entdecken und genießen!"
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://schniddzl.de/" />
    <meta property="og:image" content="https://schniddzl.de/static/schniddzl.webp" />
    <meta property="og:locale" content="de_DE" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Schniddzl.de – Mittagessen in Stuttgart" />
    <meta name="twitter:description" content="Finde die besten Mittagstische und Restaurants in Stuttgart und Umgebung. Täglich neu!" />
    <meta name="twitter:image" content="https://schniddzl.de/static/schniddzl.webp" />
    <meta name="twitter:site" content="@schniddzl" />
    <link rel="icon" type="image/png" href="/static/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg" />
    <link rel="shortcut icon" href="/static/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/static/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="Schniddzl.de" />
    <link rel="manifest" href="/static/site.webmanifest" />
    <title>Mittagessen Stuttgart: Täglich aktuelle Mittagsangebote & Restaurants | Schniddzl.de</title>
    <!-- Structured Data for SEO -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "Schniddzl.de",
        "url": "https://schniddzl.de/",
        "description": "Finde täglich aktuelle Mittagsangebote und Restaurants in Stuttgart und Umgebung. Schniddzl.de bietet dir eine einzigartige Übersicht über die besten Mittagstische, Speisekarten und kulinarische Highlights der Region.",
        "inLanguage": "de-DE",
        "potentialAction": {
          "@type": "SearchAction",
          "target": "https://schniddzl.de/?q={search_term_string}",
          "query-input": "required name=search_term_string"
        }
      }
    </script>
  </head>
  <body>
    <noscript>
      <main>
        <h1>Mittagskarten in der Region Stuttgart</h1>
        <p>Schniddzl.de zeigt aktuelle Restaurants und Mittagsangebote aus der Region.</p>
        <ul>
          {{ range .Restaurants }}
          <li>
            <strong>{{ .Name }}</strong>
            {{ if .Website }} –
            <a href="{{ .Website }}">{{ .Website }}</a>
            {{ end }}
          </li>
          {{ end }}
        </ul>
      </main>
    </noscript>
    <script id="initial-restaurants" type="application/json">
      {{ toJSON .Restaurants }}
    </script>
    <script id="initial-email" type="application/json">
      {{ toJSON .Email }}
    </script>
    <script>
      window.__RESTAURANTS__ = undefined;
      const initialRestaurants = document.getElementById('initial-restaurants')?.textContent?.trim();

      if (initialRestaurants) {
        try {
          window.__RESTAURANTS__ = JSON.parse(initialRestaurants);
        } catch {
          window.__RESTAURANTS__ = undefined;
        }
      }

      window.__EMAIL__ = undefined;
      const initialEmail = document.getElementById('initial-email')?.textContent?.trim();
      if (initialEmail) {
        try {
          const encoded = JSON.parse(initialEmail);
          // Decode base64 email
          window.__EMAIL__ = atob(encoded);
        } catch {
          window.__EMAIL__ = undefined;
        }
      }
    </script>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
