name: Tests

on:
  workflow_call:
    inputs:
      generate-coverage-report:
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

jobs:
  test-backend:
    name: Backend Test and Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Run Go tests with coverage
        run: |
          docker compose run --rm test-backend sh -c '
            go test ./... -covermode=atomic -coverprofile=coverage.out &&
            go tool cover -func=coverage.out | tee coverage.txt
          '
          echo "## Coverage" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cat backend/coverage.txt >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: |
            backend/coverage.out
            backend/coverage.txt

      - name: Generate coverage report
        if: inputs.generate-coverage-report
        uses: ncruces/go-coverage-report@v0
        with:
          module-dir: backend
          coverage-file: coverage.out
        continue-on-error: true

  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Run frontend tests
        run: |
          docker compose --profile dev run --rm --entrypoint sh npm -c 'npm ci && npm test'
