services:
  backend:
    build:
      context: backend
      dockerfile: docker/dev.dockerfile
    platform: linux/amd64
    command: >
      air
      --build.cmd "go build -o tmp/main ."
      --build.args_bin "serve --http=0.0.0.0:8090"
      --build.include_ext "go"
      --build.exclude_dir "tmp,docker,data"
      --build.entrypoint "tmp/main"
      --build.delay "100"
      --build.stop_on_error "false"
      --misc.clean_on_exit true
    volumes:
      - ./backend:/app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/health"]
      start_period: 10s
      interval: 5s
      timeout: 5s
      retries: 60
    ports:
      - "8090:8090"
    networks:
      - net

  frontend:
    depends_on:
      backend:
        condition: service_healthy
    image: node:25-alpine
    working_dir: /app
    command: sh -c "yarn install --frozen-lockfile && yarn dev"
    volumes:
      - ./frontend:/app/
    ports:
      - "5173:5173"
    networks:
      - net

networks:
  net:
    external: false
