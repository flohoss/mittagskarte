services:
  backend:
    build:
      context: backend
      dockerfile: docker/dev.dockerfile
    platform: linux/amd64
    command: >
      air
      --build.cmd "go build -o tmp/main ."
      --build.args_bin "serve --http=0.0.0.0:8090"
      --build.include_ext "go"
      --build.exclude_dir "tmp,docker,pb_data"
      --build.entrypoint "tmp/main"
      --build.delay "100"
      --build.stop_on_error "false"
      --misc.clean_on_exit true
    volumes:
      - ./backend:/app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8156/health"]
      start_period: 10s
      interval: 5s
      timeout: 5s
      retries: 60
    ports:
      - "8090:8090"
