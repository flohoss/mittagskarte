# Single source of truth for container tool versions. CI reads this block too.
x-build-args: &build-args
  V_GOLANG: ${V_GOLANG:-1.26}
  V_NODE: ${V_NODE:-25}
  V_AIR: ${V_AIR:-1.64.5}
  V_PLAYWRIGHT: ${V_PLAYWRIGHT:-1.59.1}

x-images:
  go: &go-image golang:${V_GOLANG:-1.26}-alpine
  node: &node-image node:${V_NODE:-25}-alpine

services:
  backend:
    build:
      context: backend
      args: *build-args
    platform: linux/amd64
    command: >
      air
      --build.cmd "go build -o tmp/main ."
      --build.args_bin "serve --http=0.0.0.0:8090"
      --build.include_ext "go"
      --build.exclude_dir "tmp,docker,data"
      --build.entrypoint "tmp/main"
      --build.delay "100"
      --build.stop_on_error "false"
      --misc.clean_on_exit true
    volumes:
      - ./backend:/app
    environment:
      - DEV=true
      - TZ=Europe/Berlin
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8090/health']
      start_period: 10s
      interval: 5s
      timeout: 5s
      retries: 60
    ports:
      - '8090:8090'
    networks:
      - net

  release:
    profiles:
      - build
    image: ${IMAGE_NAME:-mittagskarte}:${IMAGE_TAG:-local}
    build:
      context: .
      args:
        <<: *build-args
        APP_VERSION: ${APP_VERSION:-dev}
        BUILD_TIME: ${BUILD_TIME:-unknown}
        REPO_URL: ${REPO_URL:-}

  go:
    profiles:
      - dev
    image: *go-image
    working_dir: /app
    entrypoint: go
    volumes:
      - ./backend:/app/

  frontend:
    depends_on:
      backend:
        condition: service_healthy
    image: *node-image
    working_dir: /app
    command: sh -c "yarn install --frozen-lockfile && yarn dev"
    volumes:
      - ./frontend:/app/
    ports:
      - '5173:5173'
    networks:
      - net

  yarn:
    profiles:
      - dev
    image: *node-image
    working_dir: /app
    entrypoint: yarn
    volumes:
      - ./frontend:/app/

networks:
  net:
    external: false
